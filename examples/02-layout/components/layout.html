<!--section::output-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <!--
    renderSection('title', 'My App') renders the child's "title" section.
    The second argument is the default shown when no child fills the slot.
  -->
  <title><renderSection name="title" default="My App" /></title>

  <!--
    renderSectionBlock('style') collects <style> blocks from ALL loaded
    components and outputs them together — each annotated with its origin.
    Pass a ModifierInterface to minify (see example 03).
  -->
  <renderSectionBlock name="style" />

</head>
<body>

  <nav><a href="/">Home</a></nav>

  <main>
    <!--
      renderSection('content') is the primary page slot.
      No default — pages are expected to always fill it.
    -->
    <renderSection name="content" />
  </main>

  <renderSectionBlock name="script" />

  <!--
    Flush any runtime errors (missing components, bad loads) to the
    browser console. Remove in production.
  -->
  <renderSectionBlock name="console_errors" />

</body>
</html>
