<!--
  Login view — a self-contained SFC-style component.
  Three sections, each collected separately by the layout:
    style    → <head> via renderSectionBlock('style')
    template → body   via renderSectionBlock('template')
    script   → body   via renderSectionBlock('script')
-->

<!--section::style-->
<style>
  .login {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: calc(100vh - 52px);
  }
  .login-box {
    background: #fff;
    border: 1px solid #e2e8f0;
    border-radius: 10px;
    padding: 2.5rem 2rem;
    width: 340px;
    box-shadow: 0 4px 24px rgba(0,0,0,.06);
  }
  .login-box h2     { margin-bottom: 1.5rem; font-size: 1.4rem; }
  .login-box label  { display: block; font-size: .85rem; color: #64748b; margin-bottom: .3rem; }
  .login-box input  { display: block; width: 100%; padding: .55rem .75rem; border: 1px solid #cbd5e1;
                      border-radius: 5px; font-size: 1rem; margin-bottom: 1.1rem; }
  .login-box input:focus { outline: none; border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79,70,229,.15); }
  .login-box button { width: 100%; padding: .65rem; background: #4f46e5; color: #fff;
                      border: none; border-radius: 5px; font-size: 1rem; cursor: pointer; }
  .login-box button:hover { background: #4338ca; }
</style>

<!--section::template-->
<script type="text/template" id="view-login">
  <div class="login">
    <div class="login-box">
      <h2>Sign in</h2>
      <label>Email</label>
      <input type="email" placeholder="you@example.com">
      <label>Password</label>
      <input type="password" placeholder="••••••••">
      <button onclick="loginSubmit()">Sign in</button>
    </div>
  </div>
</script>

<!--section::script-->
<script>
  function loginSubmit() {
    alert('Login submitted — wire up your backend here.');
  }
</script>
