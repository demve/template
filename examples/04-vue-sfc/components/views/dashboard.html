<!--
  Dashboard view — another self-contained SFC-style component.
  Its style, template, and script are each collected independently
  and placed in the layout alongside Login's sections.
-->

<!--section::style-->
<style>
  .dashboard         { padding: 2rem; }
  .dashboard h2      { font-size: 1.5rem; margin-bottom: 1.5rem; }
  .stats             { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
  .stat-card         { background: #fff; border: 1px solid #e2e8f0; border-radius: 8px;
                       padding: 1.5rem; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,.04); }
  .stat-card .value  { display: block; font-size: 2rem; font-weight: 700; color: #4f46e5; }
  .stat-card .label  { font-size: .85rem; color: #64748b; margin-top: .25rem; }
  .activity          { background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 1.5rem; }
  .activity h3       { font-size: 1rem; margin-bottom: 1rem; color: #475569; }
  .activity ul       { list-style: none; }
  .activity li       { padding: .5rem 0; border-bottom: 1px solid #f1f5f9; font-size: .9rem; color: #334155; }
  .activity li:last-child { border-bottom: none; }
</style>

<!--section::template-->
<script type="text/template" id="view-dashboard">
  <div class="dashboard">
    <h2>Dashboard</h2>
    <div class="stats">
      <div class="stat-card">
        <span class="value">142</span>
        <div class="label">Users</div>
      </div>
      <div class="stat-card">
        <span class="value">38</span>
        <div class="label">Orders today</div>
      </div>
      <div class="stat-card">
        <span class="value">$4.2k</span>
        <div class="label">Revenue</div>
      </div>
    </div>
    <div class="activity">
      <h3>Recent activity</h3>
      <ul>
        <li>User alice@example.com signed up</li>
        <li>Order #1042 completed</li>
        <li>Server health check passed</li>
        <li>New comment on post #7</li>
      </ul>
    </div>
  </div>
</script>

<!--section::script-->
<script>
  // Dashboard-specific JS — data fetching, charts, etc. would go here.
  console.log('Dashboard view registered.');
</script>
